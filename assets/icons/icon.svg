<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0b0806"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="90" ry="90"
        fill="none" stroke="rgba(200,146,42,.20)" stroke-width="1.5"/>

  <!-- Outer ring: dashed circle + hexagon (matches homepage sigil-ring-outer) -->
  <g filter="url(#glowSoft)" stroke="rgba(200,146,42,.65)" fill="none">
    <circle cx="256" cy="256" r="222" stroke-width="2" stroke-dasharray="17 11"/>
    <polygon points="256,34 478,145 478,367 256,478 34,367 34,145"
             stroke-width="2.5" stroke="rgba(200,146,42,.40)" opacity=".7"/>
  </g>

  <!-- Mid ring: dashed circle + hexagon (matches homepage sigil-ring-mid) -->
  <g stroke="rgba(200,146,42,.55)" fill="none">
    <circle cx="256" cy="256" r="165" stroke-width="1.6" stroke-dasharray="11 17"/>
    <polygon points="256,91 399,193 399,319 256,421 113,319 113,193"
             stroke-width="1.8" opacity=".6"/>
  </g>

  <!-- Core sigil (matches homepage sigil-core) -->
  <g stroke="rgba(240,184,64,.90)" fill="none" filter="url(#glow)">
    <!-- Inner circle -->
    <circle cx="256" cy="256" r="102" stroke-width="3"/>
    <!-- Cross lines -->
    <line x1="256" y1="154" x2="256" y2="358" stroke-width="2"/>
    <line x1="154" y1="256" x2="358" y2="256" stroke-width="2"/>
    <!-- Diagonal lines -->
    <line x1="185" y1="185" x2="327" y2="327" stroke-width="1.6" opacity=".65"/>
    <line x1="327" y1="185" x2="185" y2="327" stroke-width="1.6" opacity=".65"/>
    <!-- Small center circle -->
    <circle cx="256" cy="256" r="23" stroke-width="3.5"
            fill="rgba(200,146,42,.10)"/>
    <!-- Compass star points — N S E W -->
    <polygon points="256,165 264,233 256,244 248,233"
             fill="rgba(240,184,64,.70)" stroke="none"/>
    <polygon points="256,347 264,279 256,268 248,279"
             fill="rgba(240,184,64,.70)" stroke="none"/>
    <polygon points="347,256 279,264 268,256 279,248"
             fill="rgba(240,184,64,.70)" stroke="none"/>
    <polygon points="165,256 233,264 244,256 233,248"
             fill="rgba(240,184,64,.70)" stroke="none"/>
  </g>
</svg>